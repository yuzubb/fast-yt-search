[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "youtube-search-api"
version = "0.1.0"
description = "Python (FastAPI) で動作する高速・軽量な非公式YouTube検索API"
readme = "README.md"
requires-python = ">=3.8"
authors = [
  { name = "あなたの名前", email = "your.email@example.com" }
]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]

# pip install 時に自動でインストールされる依存ライブラリ
dependencies = [
    "fastapi>=0.100.0",
    "uvicorn[standard]>=0.20.0",
    "httpx>=0.24.0",
    "dict2xml>=1.7.0",
]

[project.urls]
"Homepage" = "https://github.com/あなたのGitHubユーザー名/youtube-search-api"
"Bug Tracker" = "https://github.com/あなたのGitHubユーザー名/youtube-search-api/issues"
